<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Low Quality Converter</title>
<style>
    @font-face {
        font-family: 'Needleteeth';
        src: url('/fonts/Needleteeth Creepy.ttf') format('truetype');
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url('/images/ImageBody1.png');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        animation: 
            squirm 10s ease-in-out infinite alternate,
            background-switch 4s step-end infinite;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        animation: flash-toggle 1.4s step-end infinite;
    }

    @keyframes background-switch {
        0%   { background-image: url('/images/ImageBody1.png'); }
        20%  { background-image: url('/images/ImageBody2.png'); }
        40%  { background-image: url('/images/ImageBody3.png'); }
        60%  { background-image: url('/images/ImageBody4.png'); }
        80%  { background-image: url('/images/ImageBody5.png'); }
        100% { background-image: url('/images/ImageBody1.png'); }
    }

    @keyframes flash-toggle {
        0%   { background-image: url('/images/ImageBody1.png'); }
        50%  { background-image: url('/images/ImageBody2.png'); }
    }

    @keyframes squirm {
        0% { background-position: 0% 0%; }
        50% { background-position: 5% 5%; transform: scale(1.02); }
        100% { background-position: -5% -5%; }
    }

    .title-text {
        position: fixed;
        /* Increased to move lower */
        top: 100px; 
        left: 0;
        width: 100%;
        
        font-family: 'Needleteeth', cursive;
        color: #A5A557; 
        font-size: 180px;
        line-height: 1;
        text-align: center;
        z-index: 10;
        
        padding-left: 0.5ch; 
        
        pointer-events: none;
        text-shadow: 
            -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
            0px 4px 0 #000, 4px 0px 0 #000, 0px -4px 0 #000, -4px 0px 0 #000,
            0px 8px 0 #000, 8px 0px 0 #000, 0px -8px 0 #000, -8px 0px 0 #000;
    }

    .container {
        position: relative;
        width: 350px;
        padding: 30px;
        border: 20px solid transparent; 
        border-image-source: url('/images/ImageBox.png');
        border-image-slice: 30;
        border-image-repeat: stretch;
        background: #000;
        text-align: center;
        box-sizing: border-box;
    }

    #progress-container {
        position: absolute;
        bottom: 30px; /* Aligns to bottom padding */
        left: 30px;
        right: 30px;
        display: none;
    }

    input[type="file"], select, button {
        width: 100%;
        margin-bottom: 20px;
        background: #1a0000;
        color: #cc0000;
        border: 2px inset #550000;
        padding: 10px;
        font-weight: bold;
        box-sizing: border-box;
        display: block;
    }

    button { cursor: pointer; border: 2px outset #550000; }
    button:active { border-style: inset; }
</style>
</head>
<body>

    <div class="title-text">VideoConverter.EXE</div>

    <div class="container">
        <input type="file" id="video" accept="video/mp4,video/x-ms-wmv,.mp4,.wmv">
        <select id="preset">    
            <option value="yt2006">Windows Movie Maker</option>
            <option value="creepypasta">.EXE</option>
            <option value="lostepisode">Lost Episode</option>
        </select>
        <button onclick="uploadVideo()">CONVERT</button>
    
        <div id="progress-container">
            <div style="background:#550000; height:15px; width:100%; border:2px solid #cc0000;">
                <div id="progress-bar" style="background:#cc0000; height:100%; width:0%; transition: width 0.3s;"></div>
            </div>
        </div>
    </div>

<script>
async function uploadVideo() {
    const file = document.getElementById("video").files[0];
    const preset = document.getElementById("preset").value; // Get the select value
    const btn = document.querySelector("button");
    const pContainer = document.getElementById("progress-container");
    const pBar = document.getElementById("progress-bar");
    
    if(!file) return alert("Select a video.");
    btn.disabled = true;
    pContainer.style.display = "block";
    
    const data = new FormData();
    data.append("video", file);
    data.append("preset", preset); // Append to data
    
    const response = await fetch("https://videoco-exe.onrender.com/convert", { method: "POST", body: data });
    const { jobId } = await response.json();
    
    const interval = setInterval(async () => {
        const statusRes = await fetch(`https://videoco-exe.onrender.com/status/${jobId}`);
        
        const { status, progress } = await statusRes.json();
        
        if (progress !== undefined) pBar.style.width = progress + "%";
        
        if (status === "done") {
            clearInterval(interval);
            btn.innerText = "DOWNLOADING...";
            
            const downloadRes = await fetch(`https://videoco-exe.onrender.com/download/${jobId}`);
            const blob = await downloadRes.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = "converted.mp4";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            btn.innerText = "CONVERT";
            btn.disabled = false;
            pContainer.style.display = "none";
        } else if (status === "error") {
            clearInterval(interval);
            alert("Conversion failed.");
            btn.disabled = false;
            pContainer.style.display = "none";
        }
    }, 1000);
}
</script>
</body>
</html>
